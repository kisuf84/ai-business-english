      "title": "The Limits of Technological Solutions to Environmental Problems",
      "paras": [
        "The relationship between technology and environmental problems is genuinely ambivalent: technology is simultaneously the primary driver of environmental degradation through its amplification of human economic activity's environmental impact, and the primary mechanism through which environmental challenges are expected to be addressed in most mainstream policy frameworks. The technological optimism that characterises most official climate and environmental policy reflects both genuine innovation success stories, including the spectacular cost reductions in solar and wind energy and the demonstrated improvements in resource efficiency across multiple industrial sectors, and a motivated reasoning that is easier to sustain than the politically more challenging alternatives of consumption reduction and economic transformation. Understanding where technology can genuinely deliver environmental solutions, and where its apparent promise obscures the need for social and political change, is essential for effective environmental governance.",
        "The concept of carbon capture and storage, and its more speculative extension to direct air capture of carbon dioxide from the atmosphere, illustrates both the potential and the risks of technological optimism in climate policy. CCS involves capturing carbon dioxide at the point of emission from power plants or industrial facilities and storing it permanently underground. The technology exists and has been demonstrated at commercial scale, but the pace of deployment has been dramatically slower than projections made in the 2000s suggested, due to higher-than-expected costs, geological uncertainties about long-term storage security, and the availability of cheaper emission reduction alternatives including renewable energy. The risk of over-reliance on CCS and negative emissions technologies is that they provide a rationale for maintaining or expanding fossil fuel infrastructure under the assumption that emissions can be addressed at a later date through as-yet-unproven technology at scale, a pattern sometimes called moral hazard or mitigation deterrence.",
        "The governance of emerging environmental technologies requires frameworks that can evaluate potential contributions and risks without either premature prohibition of technologies that could make genuine contributions or premature deployment of technologies whose full implications are inadequately understood. Geoengineering technologies, particularly solar radiation management through stratospheric aerosol injection, represent the most extreme case of this governance challenge: the technology could in principle reduce global temperatures rapidly at relatively low direct cost, but it would alter precipitation patterns in ways that could severely affect specific regions, would not address ocean acidification driven by atmospheric CO2, and would create a termination shock risk if deployment were halted without prior emission reduction. No adequate governance framework exists for decisions with this combination of global scope, differential regional impacts, and potentially irreversible consequences, and the development of such a framework is itself politically contested because any governance regime that permits geoengineering research also necessarily legitimises the technology as a potential policy option.",

      "paras": [
        "The global commons, the shared resources and spaces that lie outside national jurisdiction and are available to all including the atmosphere, the high seas, Antarctica, and outer space, represent the paradigm case of collective action problems in international governance. Garrett Hardin's influential but contested metaphor of the tragedy of the commons argued that shared resources would inevitably be overexploited by individually rational actors whose private gains from exploitation exceed their share of the collective costs of depletion: without exclusion mechanisms and governance arrangements, common resources face systematic destruction by rational self-interest. Elinor Ostrom's Nobel Prize-winning research provided a crucial corrective, demonstrating that communities have historically developed and maintained effective institutions for governing common pool resources, and identifying the conditions under which self-governance of commons can succeed without either privatisation or state control.",
        "The application of commons governance principles to global commons is significantly more challenging than to the local and regional commons that Ostrom studied, primarily because the number of actors, the diversity of their interests, the difficulty of monitoring compliance, and the weakness of enforcement mechanisms all increase with the scale of governance. The atmosphere as a global commons has been governed through the UNFCCC framework since 1992, but the framework's reliance on voluntary national contributions has produced emission trajectories significantly above those consistent with agreed temperature targets. The high seas, covering approximately 64% of the ocean's surface and long governed by the principle of freedom of the seas, have faced progressive overexploitation of fisheries, pollution through plastic and chemical waste, and deep-sea mining pressures that existing governance frameworks have been inadequate to address. The 2023 High Seas Treaty, adopted after nearly two decades of negotiation, represents a significant institutional development, establishing marine protected areas on the high seas for the first time.",
        "The concept of collective responsibility for global commons is philosophically contested in ways that reflect broader debates about the nature of group agency and collective obligation. Individual states can reasonably argue that they bear only a small portion of responsibility for global commons degradation and that unilateral action imposes costs without commensurate environmental benefit; the logic of this argument, applied consistently by all actors, produces the collective inaction that characterises much international environmental governance. The philosophical response to this logic identifies a distinction between causal responsibility, for which each state bears only a small share, and collective responsibility, which attaches to states as members of a system of relations that produces the collective outcome even when no individual actor is sufficient for that outcome. Whether collective responsibility of this kind generates individual obligations to act, or merely obligations to cooperate in creating collective action mechanisms, is both philosophically contested and practically consequential for the design of international environmental governance.",

        "The role of corporations in environmental protection is contested between those who argue that corporate environmental engagement represents a genuine and potentially transformative contribution to environmental sustainability, and those who argue that voluntary corporate environmental action is inadequate as a substitute for mandatory regulation, systematically undermines the regulatory agenda by creating the impression of progress without requiring the structural changes that genuine sustainability demands, and is primarily a form of reputation management rather than genuine environmental stewardship. Both positions contain important insights, and the evidence for each varies significantly across different types of corporate environmental engagement, different industries, and different institutional contexts. The most sophisticated analysis distinguishes between genuine corporate environmental leadership, performative greenwashing, and the large middle ground of compliance-oriented corporate environmental management that pursues environmental improvements within existing regulatory constraints without challenging the structural drivers of environmental harm.",
        "The emergence of environmental, social, and governance investing as a major force in financial markets has created significant new pressures on corporations to demonstrate environmental performance. ESG-oriented investors, including both retail investors seeking to align their portfolios with their values and institutional investors responding to their own stakeholder pressures and risk assessments, have directed significant capital flows toward companies with stronger environmental performance metrics. The financial materiality argument, which holds that environmental risks including climate change, water scarcity, and supply chain disruption represent genuine financial risks that fiduciaries have obligations to assess and manage, has been increasingly accepted by mainstream investors and regulators, bringing environmental performance into the core of mainstream investment analysis. However, the ESG movement has faced significant challenges including inconsistent and often misleading metrics, the difficulty of measuring genuine environmental performance versus self-reported data, and a significant greenwashing problem in which financial products marketed as green do not reliably deliver the environmental outcomes they claim.",
        "The limits of voluntary corporate environmental action become most apparent when examining the structural relationship between corporate incentives and environmental outcomes. Corporations operating within markets that do not price environmental costs will systematically under-invest in environmental protection relative to what social welfare optimisation would require, regardless of the genuine environmental commitments of individual corporate leaders. The solution that environmental economics prescribes, appropriate pricing of environmental costs through carbon taxes, pollution charges, and natural capital accounting, creates the incentive structures that make genuine corporate environmental engagement financially rational rather than merely reputationally valuable. Without these structural incentive changes, corporate environmental engagement will remain constrained by competitive dynamics that penalise environmental investment that competitors do not match, producing a race to the bottom in environmental standards that voluntary commitments and consumer preferences alone cannot prevent.",

        "Autonomy, the capacity for self-governance based on one's own values and judgment rather than external direction, is both a defining characteristic of persons in most philosophical traditions and a value that artificial intelligence systems are increasingly capable of approximating in specific functional domains. The question of AI's relationship to human autonomy is therefore double-edged: AI systems may enhance human autonomy by extending cognitive capabilities, reducing drudgery, and providing resources and information that support more informed self-governance; and they may diminish it by making decisions that substitute for rather than support human judgment, creating dependencies that erode self-reliance, and providing individualised manipulation capabilities to those who control AI systems. Which of these effects predominates is not determined by AI technology as such but by the choices made about how it is designed, deployed, and governed.",
        "The enhancement dimension of AI's relationship to autonomy is most clearly evident in medical and accessibility applications: AI-powered prosthetics and communication aids that extend the functional autonomy of people with disabilities; diagnostic AI that provides patients and clinicians with better information for medical decision-making; and personalised learning systems that adapt educational content to individual needs and learning styles. In each of these cases, AI augments rather than replaces human judgment and agency, providing capabilities that support individuals' own choices about their lives. The diminishment dimension is most clearly evident in highly automated decision systems that make consequential determinations about individuals' creditworthiness, parole eligibility, job applications, and insurance premiums with minimal human oversight, creating accountability gaps in which neither the affected individuals nor the nominally responsible humans understand the basis of decisions that significantly affect their lives.",
        "The governance dimension of AI and autonomy raises questions that go beyond the individual level to encompass the political conditions of collective self-governance. When AI systems developed and controlled by a small number of powerful corporate and state actors provide the information environment, communication infrastructure, and decision support systems through which democratic deliberation occurs, the autonomy of democratic politics itself is potentially compromised. The concentration of AI capability in a small number of actors creates asymmetries in cognitive and informational power that parallel the economic power asymmetries documented in political economy analysis: those who control AI systems can shape the information and option sets within which democratic citizens make their choices in ways that are difficult to detect, resist, or regulate through conventional democratic mechanisms. The challenge of maintaining genuine collective self-governance in conditions of concentrated AI capability is one of the most significant political challenges of the twenty-first century.",

      "title": "The Ethics of Human Enhancement Technologies",
      "paras": [
        "Human enhancement technologies, interventions that seek to improve human capacities beyond what is necessary for normal health and functioning, are raising ethical questions that existing bioethical frameworks were not designed to address. The spectrum of enhancement technologies ranges from the relatively uncontroversial, including improved nutrition, education, and psychotherapy that most people accept as obviously permissible, to the more contested, including cognitive-enhancing pharmaceuticals, genetic selection of embryo characteristics, and brain-computer interfaces, to the hypothetically transformative, including radical life extension, uploading of consciousness, and the genetic engineering of germline traits that would affect all descendants. As technologies move from hypothetical to practical in each of these categories, the ethical questions they raise move from philosophical speculation to urgent governance decisions.",
        "The conservative bioethical tradition, associated with thinkers including Michael Sandel and Leon Kass, argues that there are important moral reasons to accept the given rather than to seek mastery over human nature through technological enhancement. Sandel's argument from giftedness holds that treating children's characteristics as outcomes to be optimised rather than gifts to be received changes the character of parental love in ways that are ethically damaging: parents who have selected for their children's intelligence, height, and personality traits are more likely to regard their children as achievements that reflect their choices rather than persons to be accepted unconditionally. Kass argues that the human relationship to mortality, limitation, and the given conditions of embodied existence is not merely a problem to be solved but a constitutive feature of human life whose transformation through technology risks the loss of something essential to human flourishing.",
        "The liberal transhumanist tradition, associated with thinkers including Nick Bostrom and Julian Savulescu, argues that the ethical case for enhancement is continuous with the ethical case for conventional medicine: both aim to reduce suffering and increase flourishing, and the distinction between treatment and enhancement is difficult to draw in a way that generates stable moral significance. Savulescu's principle of procreative beneficence argues that parents have an obligation, not merely a permission, to select the best possible children they can, where best means children most likely to lead flourishing lives; on this account, refusing available enhancements is not ethically neutral but represents a choice against flourishing that is difficult to justify. The governance challenge is that the liberal framework's commitments to individual autonomy and reproductive liberty make it difficult to impose collective constraints on enhancement decisions even when those decisions have potentially significant collective consequences, including widening social inequality when enhancements are available only to the wealthy.",

    {
      "title": "The Political Power of Digital Platforms",
      "paras": [
        "Digital platforms have acquired a form of political power that defies easy categorisation within existing political theory frameworks. They are not states, yet they make and enforce rules governing the speech and conduct of billions of people across national borders. They are not political parties, yet their algorithmic choices shape the information environments within which political opinions are formed and political behaviour is mobilised. They are not media companies in the traditional sense, yet they are the primary intermediaries through which most political communication occurs in many democracies. And they are not traditional corporations simply selling products and services, yet their decisions about content moderation, algorithm design, and platform access have profound consequences for political competition, democratic deliberation, and the distribution of political voice in ways that have no precedent in the history of private enterprise.",
        "The political power of digital platforms manifests through several distinct mechanisms. Content moderation decisions, including removal of specific accounts and posts, application of warning labels to disputed content, and algorithmic downranking of specific content types, directly affect the visibility and reach of political speech. Platform design choices about what content to show users and in what order reflect decisions about whose voices are amplified and whose are suppressed that have political consequences even when they are not made with explicitly political intent. And the data platforms collect about users provides both commercial and political actors with targeting capabilities that can be used to identify and mobilise specific political constituencies or to engage in precision-targeted persuasion at previously impossible scales. The Cambridge Analytica scandal provided a concrete illustration of how platform data combined with psychological profiling could be deployed for political targeting purposes in electoral contexts.",
        "The governance of digital platform political power faces a fundamental legitimacy problem: who has the right to determine the rules governing political communication on platforms that have become essential public infrastructure for democratic deliberation? The platforms themselves have asserted the right to make these determinations through their terms of service and content moderation policies, grounding this authority in private property rights and contractual freedom. National governments have asserted regulatory authority over platform political speech, producing a fragmented and sometimes contradictory landscape of national regulation that includes the EU's Digital Services Act, various national electoral integrity laws, and in some cases outright authoritarian government control of political speech on platforms. And civil society organisations, academic researchers, and platform users have argued for more democratic and transparent governance of platform political power that neither pure platform self-regulation nor pure government control adequately provides.",

      "paras": [
        "The relationship between algorithmic systems and knowledge is transforming how knowledge is produced, validated, distributed, and accessed in ways that raise fundamental epistemological questions about the nature of justified belief and the social conditions of knowledge. The traditional epistemological analysis of knowledge as justified true belief presupposes individual epistemic agents who acquire beliefs through perception, testimony, and reasoning, and whose beliefs are justified through their connection to reliable cognitive processes and credible sources. The algorithmic mediation of knowledge challenges each element of this account: algorithms rather than individual judgment determine what information is encountered and in what order; the processes through which algorithmic recommendations are generated are opaque even to their designers; and the social conditions of knowledge production are increasingly shaped by the incentive structures of algorithmic platforms rather than by the epistemic norms of academic and journalistic communities.",
        "The impact of algorithms on the production of knowledge operates through several distinct mechanisms. The academic publishing system, already characterised by significant distortions from commercial incentives and metric-driven evaluation, is increasingly influenced by algorithmic citation analysis that shapes what research is funded, published, and read; optimisation for citation metrics can produce research that is technically sophisticated but of limited genuine intellectual value. The journalism industry's adaptation to algorithmic distribution has substantially altered the content, length, and framing of journalism, with click-optimised headlines, emotionally activating content, and fast news cycles increasingly displacing the investigative and analytical journalism that democratic accountability requires. And the emergence of AI-generated content, including the large language models capable of producing plausible-sounding text on virtually any topic, has introduced a new category of knowledge production whose relationship to truth is fundamentally different from that of human authors: LLMs produce fluent text by pattern-matching on training data without the understanding, experience, or truth-directed motivation that human knowledge production involves.",
        "The social epistemology of the algorithmic age requires developing new norms and institutions adequate to the epistemic challenges it creates. Information verification institutions, including fact-checking organisations, pre-publication scientific review, and platform labelling systems, represent partial responses to the proliferation of misinformation but face the fundamental asymmetry that false information can be produced at a fraction of the cost and time required to evaluate and correct it. Media literacy education, which aims to equip citizens with the cognitive tools to evaluate information sources and resist manipulation, is a necessary but insufficient response: individual cognitive capabilities have practical limits, and the scale, personalisation, and sophistication of algorithmic manipulation increasingly exceed what even well-trained individuals can reliably detect. And the governance of knowledge-shaping algorithms requires transparency and accountability standards that current regulatory frameworks do not adequately provide, creating ongoing epistemic risks for the democratic deliberation that depends on shared factual foundations.",

        "Digital infrastructure, the interconnected systems of hardware, software, and networks that underpin contemporary economic, social, and governmental functions, has become both essential to human welfare and systematically fragile in ways that create vulnerabilities with potentially catastrophic consequences. The essential character of digital infrastructure is demonstrated by the scale of disruption produced by significant cyber incidents: the 2017 NotPetya attack caused approximately $10 billion in damages across multiple countries; ransomware attacks on hospitals have directly endangered patient lives; and the 2020 SolarWinds attack compromised the networks of multiple US government agencies and thousands of private companies for months before detection. The fragility of this infrastructure reflects both the inherent complexity of networked systems and the systematic under-investment in security that results from the market failures, organisational cultures, and regulatory gaps that characterise cybersecurity governance.",
        "The threat landscape in cybersecurity is characterised by several dynamics that make traditional security frameworks inadequate. The asymmetry of attack and defence, in which attackers need find only one successful exploit while defenders must protect all possible vectors, creates a structural disadvantage for defenders that no amount of defensive investment can fully overcome. The supply chain attack vector, exemplified by the SolarWinds incident and the XZ Utils backdoor discovered in 2024, exploits the trust that software users place in the development and distribution processes of widely used software packages, allowing compromise at a scale that direct attacks on individual targets could not achieve. And the increasing attribution of sophisticated cyberattacks to state actors, particularly from Russia, China, Iran, and North Korea, has introduced geopolitical dimensions into cybersecurity that make straightforward law enforcement responses inadequate and that raise questions about the appropriate characterisation of cyberattacks under international law governing use of force.",
        "The governance of cybersecurity involves a complex public-private relationship that differs fundamentally from most other security domains. The majority of critical digital infrastructure is owned and operated by private actors who have primary responsibility for its security but who face market incentives that systematically under-prioritise security investment relative to what social welfare optimisation would require. Governments have regulatory authority over specific critical infrastructure sectors but lack both the technical expertise and the visibility into private systems needed for comprehensive oversight. International cooperation on cybersecurity is complicated by the simultaneous interest of state actors in both defending their own digital infrastructure and maintaining offensive cyber capabilities for intelligence and military purposes, creating a fundamental conflict of interest that prevents the kind of comprehensive international cooperation that effective global cybersecurity governance would require.",

        "Data monetisation, the conversion of data generated by individuals' digital activities into economic value for the companies that collect and process it, has become one of the central mechanisms of the platform economy and one of the most ethically contested practices in contemporary digital capitalism. The scale of data collection is immense: major platform companies collect data on billions of users including location, search history, communication content, social relationships, consumption patterns, health indicators, and emotional states, creating behavioural profiles of extraordinary granularity that are used to target advertising, to train AI systems, and to provide data services to third parties. The economic value generated from this data is enormous, forming the financial foundation of some of the most valuable companies in human history, while the compensation provided to the individuals who generate this value is typically zero, creating what some economists describe as a radical form of value extraction without market transaction.",
        "The ethical frameworks for evaluating data monetisation reveal significant disagreements about the relevant concepts and values. Property frameworks argue that individuals have ownership rights over data they generate and that the extraction of economic value from personal data without compensation violates those rights; on this account, the appropriate remedy is either data ownership legislation that enables individuals to receive compensation for their data or to prohibit its commercial use without explicit consent. Privacy frameworks emphasise the relationship between data monetisation and informational self-determination, the right to control information about oneself; on this account, the relevant harm is not primarily economic but dignitary and autonomy-related, and the appropriate remedy involves strengthening consent requirements and data minimisation principles rather than primarily creating new property rights. And democratic frameworks argue that the aggregate effects of large-scale data monetisation on political power, public deliberation, and the conditions of democratic self-governance make it a matter of public concern that cannot be adequately addressed through individual rights frameworks alone.",
        "The consent mechanisms through which data monetisation is currently legitimised are widely criticised as inadequate proxies for genuine informed consent. The terms of service agreements through which users nominally consent to data collection and use are typically unread, incomprehensible to ordinary users, subject to unilateral modification by platforms, and presented on a take-it-or-leave-it basis that does not reflect genuine negotiating equality between the parties. The concept of meaningful consent, which requires that individuals have realistic alternatives, adequate information, and genuine freedom to choose, is systematically violated by the structure of digital consent frameworks as they currently exist. The EU's General Data Protection Regulation represents the most ambitious attempt to strengthen consent requirements, but its effectiveness has been limited by the difficulty of enforcing detailed consent requirements across complex data processing ecosystems and by the phenomenon of consent fatigue in which users reflexively click through consent dialogues without reading them.",

      "paras": [
        "Human agency, the capacity to act purposively based on one's own intentions, values, and deliberation, is confronting a new set of challenges in algorithmic environments that are qualitatively different from those posed by previous technologies. Earlier tools, from writing to printing to broadcasting, extended human capabilities while leaving the deliberative processes of intention formation and decision-making primarily with human agents. Algorithmic systems increasingly intervene in the earlier stages of the agential process itself: they shape the option sets within which choices are made, influence the preferences and values that determine what options appear desirable, provide the predictions and recommendations that structure decision problems, and in some domains make decisions autonomously without human intervention in the decision process at all. The cumulative effect of these interventions on human agency is genuinely uncertain but potentially transformative.",
        "The concept of choice architecture, developed in behavioural economics and applied to digital design, reveals how the design of decision environments systematically affects choices independently of the preferences that those choices are supposed to express. Default settings, presentation order, salience of different options, and friction introduced into different choice paths all influence behaviour in ways that users typically do not recognise as influential. When choice architecture is designed by algorithms optimised for platform engagement rather than for user welfare, the resulting choices may reflect platform preferences rather than genuine user preferences in ways that users cannot easily detect or resist. The nudge paradigm associated with Thaler and Sunstein argues that choice architecture is inevitable and that the question is not whether to have it but how to design it in ways that align with people's own best interests; critics argue that this framing normalises the manipulation of choice environments in ways that undermine rather than support genuine autonomy.",
        "The relationship between algorithmic systems and collective agency raises questions about the conditions under which democratic self-governance remains meaningful. Collective agency in democratic societies requires not merely that individuals can vote and express preferences but that collective deliberation occurs in conditions that are not systematically distorted by the manipulation of information environments, the amplification of specific voices and suppression of others, and the personalisation of political communication that makes shared public discourse progressively harder to achieve. When the informational infrastructure of democratic deliberation is designed by private actors with interests that diverge from those of democratic citizens, the forms of collective agency that democracy requires may be systematically undermined even when the formal institutional structures of democratic governance remain formally intact.",

      "title": "The Future of Digital Sovereignty",
      "paras": [
        "Digital sovereignty, the aspiration of states, communities, and individuals to exercise meaningful control over the digital systems, data, and infrastructure that affect their interests, has emerged as a central concern in technology governance as the consequences of digital dependence have become increasingly apparent. The concept encompasses multiple related but distinct claims: the claim of states to regulate digital technologies operating within their territories and to protect citizens from harms generated by foreign digital actors; the claim of communities to digital self-determination including the right to develop indigenous digital infrastructure and to use digital technologies in ways that reflect their own values; and the claim of individuals to informational autonomy including control over their personal data and meaningful choice about the digital systems that mediate their lives. Each of these sovereignty claims is contested by the global, borderless character of digital systems and by the interests of the large technology corporations and states that control dominant digital infrastructure.",
        "The geopolitics of digital sovereignty has generated a fragmentation of the previously more integrated global internet into distinct digital blocs with different technical standards, governance frameworks, and regulatory philosophies. China's Great Firewall and the tightly controlled Runet model in Russia represent the most complete implementations of state digital sovereignty, in which the state exercises comprehensive control over digital infrastructure for both political and economic purposes. The European Union's digital sovereignty agenda, reflected in the GDPR, the Digital Markets Act, and the AI Act, pursues a different model: sovereignty over the rules governing digital systems rather than over the systems themselves, seeking to shape how global digital actors operate within European jurisdictions without building competing European platforms. And the United States has historically resisted digital sovereignty frameworks in favour of a free and open internet model that has aligned with the commercial interests of American platform companies, though this position has become more complicated by national security concerns about Chinese technology infrastructure.",
        "The practical implementation of digital sovereignty faces fundamental tensions with the technical architecture of the internet and with the economic logics of digital platforms. Data localisation requirements, which mandate that certain categories of data be stored and processed within national territory, impose significant costs on cloud service providers and can fragment the global data flows on which many digital services depend. Content sovereignty requirements, which mandate that platforms enforce national content standards rather than their own global policies, create operational complexity for global platforms and generate diplomatic tensions when different national standards conflict. And the ambition of building competitive domestic digital infrastructure, the aspiration of both the EU and China to develop platform alternatives that do not depend on American or Chinese technology, requires sustained investment and policy support at scales that have historically proved difficult to maintain in competitive market environments.",

        "Technology's relationship to democratic participation is characterised by genuine contradictions that simple optimistic or pessimistic narratives cannot capture. Digital technologies have demonstrably lowered the costs of political communication, mobilisation, and participation in significant ways: the Arab Spring demonstrated the capacity of social media to coordinate collective action that would previously have been impossible under authoritarian surveillance; digital petition platforms enable millions of citizens to express political preferences on specific issues at negligible individual cost; and open government data initiatives have made legislative voting records, lobbying disclosures, and government expenditure data more accessible to citizens than ever before. At the same time, the same technologies have been systematically weaponised against democratic participation through surveillance of activists, targeted harassment campaigns, and digital authoritarianism that have made digital space dangerous for many of those who most need democratic participation.",

      "title": "The Boundaries of Technological Progress",
      "paras": [
        "The concept of technological progress, the assumption that new technologies represent improvements on what preceded them and that the overall trajectory of technological development is toward greater human capability and welfare, is both deeply embedded in modern culture and significantly contested in philosophical and social analysis. The optimistic account of technological progress draws on an empirical record of genuine achievement: the reduction in infant mortality, the extension of human lifespan, the reduction of physical drudgery, and the expansion of communicative and informational capability that modern technology has enabled. The critical account argues that technological progress is not a neutral descriptive category but a normative and ideological one that systematically privileges certain kinds of improvement over others, conceals the social distribution of technological costs and benefits, and suppresses questions about whether the trajectory of development reflects democratic choices or the interests of those who control and fund technological development.",
        "The question of whether technological progress has identifiable limits, whether there are domains where technological solutions are inappropriate, insufficient, or actively harmful, challenges the universalist ambitions of technological development. Some limitations are biophysical: the laws of thermodynamics constrain energy efficiency improvements beyond certain limits; the complexity of living systems creates obstacles to biological manipulation that scale non-linearly with ambition; and the cognitive architecture of human beings may create limits on the pace at which human-technology integration can occur without generating disruptions that exceed adaptive capacity. Other limitations are social and political: technologies that require centralised control and surveillance to function effectively conflict with democratic values in ways that cannot be resolved through better design; technologies that produce benefits for some through harms to others cannot be rendered ethically acceptable through technical improvements; and the governance of technologies whose implications are genuinely uncertain requires precautionary approaches that conflict with the innovation-first culture of most technological development communities.",

      "title": "The Construction of Reality Through Perception",
      "paras": [
        "The philosophical question of whether human beings have direct access to an objective external reality, or whether what we experience as reality is in significant measure a construction of our own perceptual and cognitive systems, has been central to epistemology since Descartes. Contemporary cognitive neuroscience has substantially vindicated the constructivist position: perception is not a passive recording of external stimuli but an active process of interpretation, inference, and prediction in which the brain generates its best hypothesis about the causes of incoming sensory signals based on prior knowledge and expectations. The Bayesian brain hypothesis, developed by Karl Friston and colleagues, formalises this insight in the claim that the brain is essentially a prediction machine that continuously generates models of the world and updates them based on prediction errors, the discrepancies between predicted and actual sensory input. On this account, what we experience as reality is primarily the brain's model rather than the external world itself.",
        "The implications of the constructivist account of perception extend well beyond philosophical epistemology into domains including psychiatry, social cognition, and cultural analysis. Perceptual illusions, which demonstrate that even basic sensory experience can systematically diverge from physical reality, provide compelling evidence for the constructive character of perception. The hollow mask illusion, in which the concave interior of a face mask is perceived as convex because the brain's model of faces overrides depth perception cues, illustrates how strongly top-down prior knowledge can dominate sensory input. The rubber hand illusion, in which subjects feel touch on a rubber hand placed in their visual field as if it were their own hand, demonstrates that the brain constructs its model of body ownership from multiple sensory signals whose integration can be manipulated experimentally. And cross-cultural research has documented systematic variations in perceptual experience across different cultural contexts, suggesting that the prior knowledge and expectations that shape perception are partly culturally transmitted rather than purely biological.",
        "The social and political implications of the constructivist account of perception are significant and underappreciated. If different individuals and communities construct reality through different perceptual filters shaped by different prior experiences, cultural frameworks, and emotional states, then disagreements about matters that might appear to be straightforwardly empirical may partly reflect genuinely different perceptual experiences rather than merely different interpretations of shared experience. The motivated perception literature documents how emotional states, group identities, and prior beliefs systematically influence what people see and hear, not merely how they interpret what they see and hear: sports fans reliably see more fouls committed by the opposing team; political partisans see their candidate as performing better in presidential debates; and people under stress perceive hills as steeper and distances as greater. Understanding the constructive character of perception is therefore not merely an academic exercise but a prerequisite for more sophisticated understanding of social disagreement and conflict.",

      "title": "The Role of Narrative in Human Understanding",
      "paras": [
        "Narrative, the organisation of experience into structured stories with characters, events, causal connections, and temporal order, is not merely one of many modes of human understanding but, on influential accounts, the primary mode through which human beings make sense of their experience, their identities, and their worlds. Jerome Bruner's distinction between narrative and paradigmatic cognition identified two fundamentally different modes of thought: the paradigmatic mode, which produces logical argument and scientific explanation through the application of formal procedures to abstract propositions, and the narrative mode, which produces human understanding through the organisation of particular experiences into coherent sequences that make events intelligible by locating them within a temporal and causal context. Bruner argued that narrative cognition is not an inferior or pre-scientific form of understanding but a different kind of understanding suited to the comprehension of human action and experience, which resists full reduction to the propositional forms that paradigmatic cognition produces.",
        "The role of narrative in personal identity formation has been developed most systematically by Paul Ricoeur and Charles Taylor. Ricoeur's concept of narrative identity holds that personal identity is not a static psychological property but a dynamic achievement of self-understanding through narrative: we know who we are by understanding ourselves as characters in an ongoing story that connects our past, present, and anticipated future into a coherent whole. Taylor's analysis of narrative and the good argues that human beings are inescapably narrative animals whose sense of where they stand in moral space, whose orientation to the good, is inseparable from their sense of where they have come from and where they are going. On this account, the experience of meaninglessness, disorientation, and identity crisis that characterises various modern pathologies reflects not merely psychological but narrative failure: a breakdown in the capacity to organise experience into a coherent story that locates the self within a meaningful framework.",
        "The political and social functions of collective narrative are as significant as the personal functions of individual narrative. Nations, communities, and movements construct their identities through shared stories about their origins, their defining moments, their heroes and enemies, and their direction. These collective narratives are not merely passive reflections of shared experience but actively constitute the identities and solidarities they describe: the stories a community tells about itself shape what that community regards as possible, what it regards as just, and what it regards as threatening. The manipulation of collective narrative is therefore one of the most powerful tools of political influence: revisionist nationalist histories that construct enemies from ambiguous historical material, revolutionary narratives that reframe existing social arrangements as intolerable injustice requiring transformation, and therapeutic narratives of national victimhood or triumph all demonstrate the capacity of narrative to shape political reality. The challenge of critical narrative literacy, the ability to recognise narrative structures, evaluate their truth claims, and understand their political functions, is essential to democratic citizenship.",

      "title": "The Psychology of Moral Decision-Making",
      "paras": [
        "Moral decision-making, the process through which individuals determine what is right or wrong in specific situations and how to act accordingly, involves a complex interplay of emotional, intuitive, and deliberative processes that psychological research has substantially illuminated while also generating significant controversy about its normative implications. The dual process framework that dominates contemporary moral psychology distinguishes fast, automatic, emotionally-driven moral responses from slow, deliberative, reason-based moral reasoning, and has generated extensive research on the relative roles of these processes in determining moral judgments and behaviour. The central controversy concerns whether emotional responses are a source of moral knowledge that should inform ethical reasoning, or systematic distortions of moral judgment that should be corrected through deliberate reason, or both simultaneously in different circumstances.",
        "The research programme initiated by Joshua Greene using trolley dilemmas has been particularly influential in shaping debates about emotion and moral reasoning. Greene's dual process theory of moral judgment argues that deontological moral judgments, which prohibit certain actions regardless of their consequences, reflect emotional responses particularly associated with personal harm; while utilitarian judgments, which evaluate actions by their consequences, reflect more deliberative reasoning processes. The neuroimaging evidence that different types of moral dilemmas activate different neural systems has been taken to support this framework, though the conclusions have been contested: critics argue that the trolley problem and related scenarios are too artificial to generalise to real-world moral decision-making, that the distinction between deontological and utilitarian judgments does not map cleanly onto the distinction between emotional and deliberative responses, and that the neural evidence underdetermines the psychological and normative conclusions drawn from it.",
        "The situationist challenge in moral psychology, associated with research demonstrating that seemingly trivial situational factors have large effects on moral behaviour, raises troubling questions about the reliability of character and the nature of moral agency. Studies demonstrating that finding a dime, being in a pleasant-smelling environment, or receiving a small gift substantially increases helping behaviour suggest that much moral behaviour is driven by contextual factors rather than stable character traits. The implication that moral character may be considerably less stable and cross-situationally consistent than folk psychological accounts of virtue assume challenges both the ethical tradition that grounds morality in character development and the legal tradition that attributes blame and praise to individuals as bearers of stable character traits. The philosophical response to situationism has emphasised that situationist findings describe typical moral behaviour rather than prescribing it, and that awareness of situational influences can itself become a feature of virtuous character that enables more consistently virtuous action.",

    {
      "title": "The Nature of Conscious Experience",
      "paras": [
        "The hard problem of consciousness, formulated by David Chalmers, asks why physical processes in the brain give rise to subjective experience at all. The easy problems of consciousness, which are genuinely difficult but tractable through conventional scientific methods, concern the functional and behavioural aspects of consciousness including the mechanisms of selective attention, the neural correlates of reportable experience, the integration of information across different brain systems, and the control of behaviour by mental states. The hard problem is different in kind: even if we had a complete explanation of all these functional processes, it seems that the question of why they are accompanied by any subjective experience at all would remain unanswered. Why does information processing in certain neural systems feel like anything from the inside, rather than occurring in the dark without any accompanying experience? This explanatory gap between physical description and phenomenal experience is the central mystery of consciousness.",
        "The responses to the hard problem span a wide philosophical spectrum. Eliminative materialists, including Patricia and Paul Churchland, argue that folk psychological concepts including consciousness, belief, and desire will eventually be replaced by more precise neuroscientific descriptions, and that the hard problem is a pseudo-problem generated by confused folk categories rather than a genuine explanatory challenge. Property dualists, including Chalmers himself, argue that phenomenal consciousness is a genuine property of certain physical systems that is not reducible to or fully explained by their physical properties, and that a complete theory of the universe must include psychophysical laws connecting physical and phenomenal properties. Panpsychists, including Philip Goff and Galen Strawson, argue that consciousness or proto-conscious properties are fundamental features of reality extending to the basic constituents of matter, and that human consciousness represents a complex integration of these elementary properties. And illusionists, including Daniel Dennett and Keith Frankish, argue that the phenomenal properties that seem to generate the hard problem are themselves illusory: there is no explanatory gap because the apparent gap is generated by our mistaken belief that we have richer subjective experience than we actually do.",
        "The scientific study of consciousness has made significant progress on the easy problems while leaving the hard problem unresolved. The global workspace theory of Bernard Baars and Stanislas Dehaene identifies consciousness with the global broadcasting of information from specialised systems to a shared workspace available to multiple cognitive processes, providing an account of the functional role of consciousness that is supported by extensive empirical evidence. Integrated information theory, developed by Giulio Tononi, proposes that consciousness is identical to integrated information, formalised in the measure phi, and that any system with positive phi has some degree of consciousness. Both theories have generated active research programmes and experimental tests, but their relationship to the hard problem is contested: critics argue that they explain why certain neural processes are accompanied by reportable experience and cognitive access rather than why they are accompanied by subjective experience, and that the hard problem therefore remains untouched by their empirical successes.",

        "The question of whether human beings have genuine freedom of will, or whether human choices and actions are entirely determined by prior causes including genetics, upbringing, brain states, and environmental influences, is one of the oldest and most persistently contested in philosophy. The tension has practical as well as philosophical significance: moral responsibility, legal accountability, and the design of social institutions all depend on assumptions about human freedom and determinism that the philosophical literature has complicated without resolving. Hard determinism holds that all events including human choices are causally determined by prior events, and that genuine freedom is therefore an illusion; hard libertarianism about free will holds that human beings are genuine originators of their choices in ways that transcend causal determination; and compatibilism, the position held by a majority of contemporary philosophers, holds that freedom and determinism are not genuinely incompatible and that the kind of freedom worth caring about is compatible with causal determination.",
        "Compatibilism, in its various forms, attempts to show that the concept of freedom that matters for moral responsibility and human self-understanding does not require the ability to do otherwise in a deterministic sense but some other property that is compatible with determinism. Frankfurt's influential analysis argues that what distinguishes free action from unfree action is not freedom from causal determination but the alignment of action with the agent's higher-order desires, their desires about what they want to want. A drug addict acting under compulsion lacks freedom not because their action is determined but because it conflicts with what they would want to want on reflection; a person acting from their deeply held values acts freely even though their action is also causally determined, because their action expresses their evaluative identity rather than overriding it. Other compatibilist accounts emphasise reasons-responsiveness, the capacity to recognise and respond to moral reasons, as the property that grounds freedom and responsibility.",
        "The empirical challenge to free will from neuroscience, associated particularly with Benjamin Libet's experiments showing that neural activity predicting a voluntary movement begins several hundred milliseconds before subjects report being conscious of their intention to move, has generated significant debate about whether conscious intention plays a genuine causal role in voluntary action. Subsequent research has complicated Libet's conclusions: the readiness potential that precedes conscious intention may reflect general preparation for movement rather than a specific unconscious decision, and the experimental paradigm has been criticised for its ecological validity. The broader philosophical point, that neuroscientific findings about the neural correlates of action might threaten our self-understanding as free agents, has generated engagement from philosophers who argue that the metaphysical requirements for freedom are not what neuroscientific findings about temporal order between neural activity and conscious experience would threaten, since the relevant question concerns rational agency and self-governance rather than temporal priority of consciousness over neural processes.",

        "Identity, the set of characteristics, roles, and group memberships through which individuals understand themselves and are understood by others, is being transformed by the conditions of globalisation in ways that challenge both the stability of individual self-understanding and the coherence of collective identities that previously provided relatively stable anchors for personal identity formation. The traditional sources of identity including nationality, ethnicity, religion, occupation, and family roles have not disappeared, but their significance has changed as individuals increasingly navigate multiple cultural contexts, encounter radically different others through migration and digital communication, and face the reflexive challenge of choosing among available identity frameworks rather than simply inhabiting the identities given by birth and community. The sociological concept of liquid modernity developed by Zygmunt Bauman captures this transformation: where solid modernity provided stable institutional frameworks for identity, liquid modernity offers flexibility at the cost of the security that stable identity provides.",
        "The psychological dimensions of global identity transformation include both threats and opportunities. The threat dimension is most apparent in phenomena including culture shock, acculturative stress, and the identity confusion experienced by migrants, diaspora communities, and individuals whose traditional communities are being transformed by global forces. When the cultural frameworks that previously organised identity are challenged or disrupted, individuals face the anxiety of identity ambiguity and the cognitive and emotional work of reconstructing a coherent self-understanding from elements that may not fit together smoothly. The opportunity dimension is apparent in the expanded identity resources available to globally connected individuals: the possibility of cosmopolitan identities that transcend particular cultural affiliations; the validation available from communities of shared interest or experience that may not exist locally but are accessible digitally; and the creative possibilities that arise from the synthesis of diverse cultural influences.",

      "paras": [
        "The Enlightenment ideal of reason as the supreme faculty of human understanding, capable of generating reliable knowledge and guiding human affairs when properly applied, has been progressively qualified by evidence from cognitive psychology, behavioural economics, evolutionary psychology, and philosophy of mind that reveals systematic limitations in human rational cognition. These limitations are not merely the result of insufficient information or inadequate deliberation that more careful reasoning could in principle overcome, but reflect deep features of human cognitive architecture including the heuristics and biases documented by Kahneman and Tversky, the motivated reasoning that bends cognitive processes toward emotionally and socially preferred conclusions, and the bounded rationality that characterises decision-making under real-world constraints of time, information, and cognitive resources. The significance of these limitations extends beyond cognitive psychology into political philosophy, institutional design, and ethics.",
        "The distinction between intelligence and rationality developed by Keith Stanovich is analytically important for understanding the specific character of human cognitive limitations. Intelligence, measured by IQ and related tests, captures the efficiency and accuracy of algorithmic processing; rationality, which Stanovich distinguishes into epistemic rationality, having well-calibrated beliefs, and instrumental rationality, taking effective means to one's ends, is a different property that is only weakly correlated with intelligence. Dysrationalia, the condition of being highly intelligent while holding irrational beliefs or making systematically poor decisions, is common precisely because the cognitive processes that generate intelligence are different from those that generate rational belief and decision-making. This distinction has significant implications for institutions and democratic governance: selecting for intelligence does not select for the epistemic virtues of calibration, bias correction, and intellectual humility that rational belief formation requires.",
        "The limits of rational thought have generated different prescriptive responses in different traditions. The behavioural economics tradition, following Thaler and Sunstein, emphasises the design of choice environments that harness systematic cognitive biases to promote better outcomes: since people will be biased regardless, better to design environments that make the biased default choice a good one. The philosophical tradition of reflective equilibrium, associated with Rawls, argues that normative reasoning should involve the mutual adjustment of intuitions and principles toward coherent overall views rather than the mechanical application of principles derived from first principles alone: intuitions are data that principles must accommodate even if they also revise them. And the virtue epistemology tradition argues that the appropriate response to cognitive limitations is the cultivation of epistemic virtues including intellectual humility, open-mindedness, and careful attention to evidence, which can partially compensate for systematic biases even when they cannot eliminate them.",

      "paras": [
        "Uncertainty, the condition of incomplete, ambiguous, or unreliable knowledge about the world, is not merely an epistemological inconvenience to be reduced through better information but a fundamental feature of the human condition that shapes behaviour, motivation, and wellbeing in pervasive ways. The psychological literature distinguishes several dimensions of uncertainty that are differentially associated with different behavioural and affective responses. Risk, the condition in which the probabilities of different outcomes are known, is psychologically and behaviourally different from ambiguity, the condition in which even the probabilities are unknown; and both are different from deep uncertainty or ignorance, in which even the possible outcomes may not be identifiable in advance. Human beings are not simply uncertainty-averse in a uniform way but respond to different types of uncertainty through different cognitive strategies and emotional reactions.",
        "The psychological mechanisms through which uncertainty affects behaviour include cognitive and motivational responses that are often well-adapted to the uncertainty environments in which they evolved but that can produce maladaptive outcomes in modern contexts. Intolerance of uncertainty, the dispositional tendency to find ambiguous situations aversive and to seek closure and resolution, is associated with anxiety, worry, and various forms of avoidance behaviour: people who score high on intolerance of uncertainty measures show stronger physiological and psychological stress responses to uncertain situations and are more likely to make hasty decisions to resolve uncertainty even when waiting for more information would be adaptive. Conversely, the tendency to treat uncertain information as more certain than it is, through overconfidence and the illusion of control, can reduce anxiety in the short term while increasing exposure to risks that adequate uncertainty acknowledgment would have prompted action to reduce.",
        "The social and institutional responses to uncertainty reveal important normative questions about how societies should make decisions when outcomes are genuinely uncertain. The precautionary principle, applied in environmental and public health policy, holds that uncertainty about potential harms should not be used as grounds for inaction when the potential harms are severe and potentially irreversible: it shifts the burden of proof from demonstrating harm to demonstrating safety. Critics of the precautionary principle argue that it is unworkable as a decision rule because virtually all actions create some uncertain risks, and that it fails to acknowledge that precautionary inaction also generates uncertain risks through forgone benefits. The risk communication literature has documented systematic failures in how uncertain risks are communicated to the public: people respond to frequencies rather than probabilities, to vivid examples rather than statistical summaries, and to framing effects that make the same risk appear dramatically different depending on whether it is described in terms of outcomes or their complements.",

      "title": "The Search for Coherence in a Complex World",
      "paras": [
        "The human drive for coherence, the need to experience one's beliefs, values, actions, and world as forming an integrated and intelligible whole rather than a set of disconnected and contradictory elements, is both psychologically fundamental and perpetually challenged by the complexity, contradiction, and ambiguity of social reality. Leon Festinger's theory of cognitive dissonance, one of the most influential and empirically productive theories in social psychology, identified the psychological discomfort produced by holding simultaneously two or more beliefs or beliefs and behaviours that are mutually inconsistent, and the various cognitive strategies including selective exposure, rationalisation, and belief change through which people seek to reduce that discomfort. The theory has been extended and refined extensively, but its core insight, that the drive for cognitive consistency is a powerful motivator of both belief and behaviour change, has been consistently supported.",
        "The meaning maintenance model developed by Mark Hicks and Travis Proulx extends the coherence drive beyond cognitive consistency to encompass the broader need for a sense that experience is orderly, predictable, and significant. On this account, threats to meaning including reminders of mortality, experiences of personal uncertainty, social exclusion, and violations of expected patterns can motivate compensatory affirmation of other meaning frameworks even when those frameworks are logically unrelated to the source of the threat. Experimental evidence for this model includes findings that mortality salience increases support for worldview-defending attitudes and decreases tolerance of those who violate valued norms, that social exclusion increases conspiratorial thinking and sensitivity to patterns including false patterns, and that exposure to surrealist art or absurd stories increases the detection of hidden patterns in random visual noise. These findings suggest that the search for coherence is not merely intellectual but existential, connected to the fundamental need to inhabit a world that makes sense.",
        "The social dimensions of coherence seeking are as significant as the individual dimensions. Social groups provide shared meaning frameworks that validate individual sense-making and create the common ground for collective action; the dissolution of these frameworks through social change, cultural pluralism, or institutional failure generates both individual disorientation and collective action problems. The sociology of knowledge tradition, associated with Peter Berger and Thomas Luckmann, emphasises that reality is socially constructed: the seemingly natural and objective character of social institutions including language, money, property, and family is maintained through the continuous practical and symbolic work of social actors who routinely affirm these arrangements by participating in them. When this social maintenance fails, when reality loses its taken-for-granted character, the resulting anomie or normlessness is experienced not merely as intellectual confusion but as existential threat to the viability of social life.",

    {
      "title": "The Philosophy of Meaning in Contemporary Life",
      "paras": [
        "The philosophical question of what makes a human life meaningful, rather than merely pleasant or socially approved, has been transformed by the conditions of modernity in ways that make it both more urgent and more difficult to answer than it was in earlier cultural contexts. Pre-modern philosophical and religious traditions provided relatively stable frameworks for meaning that located individual lives within cosmic or social narratives of purpose: Aristotle's eudaimonia required the actualisation of human capacities in the context of a virtuous political community; Christian frameworks located individual purpose within a divine plan; and Confucian ethics embedded individual meaning in the fulfilment of social roles and relationships within a hierarchically ordered society. These frameworks provided orientation even when individual lives fell short of their requirements, because the requirements themselves were sufficiently shared and institutionally supported to be taken for granted rather than chosen.",

const CAT_LABELS = {
  "society": "Society & Politics",
  "business": "Business & Economics",
  "environment": "Environment & Ethics",
  "technology": "Technology & Philosophy",
  "psych": "Psychology & Behavior",
};

const CAT_KEYS = Object.keys(DATA);
let currentCat = CAT_KEYS[0];
let currentIdx = 0;
const visited = {};
const answered = {};

function getStateKey(cat, idx) {
  return cat + "_" + idx;
}

function renderSidebar(cat) {
  var list = document.getElementById("sidebarList");
  var title = document.getElementById("sidebarTitle");
  title.textContent = CAT_LABELS[cat];
  var texts = DATA[cat];
  var html = "";
  for (var i = 0; i < texts.length; i++) {
    var key = getStateKey(cat, i);
    var cls = "sidebar-item";
    if (answered[key] && answered[key].checked) cls += " done";
    if (i === currentIdx && cat === currentCat) cls += " active";
    html += '<button class="' + cls + '" onclick="loadText(\'' + cat + '\',' + i + ')"><span class="item-num">Text ' + (i+1) + '</span>' + texts[i].title + '</button>';
  }
  list.innerHTML = html;
}

function renderText(cat, idx) {
  var t = DATA[cat][idx];
  var key = getStateKey(cat, idx);
  visited[key] = true;
  updateProgress();
  var state = answered[key] || {};
  var parasHtml = "";
  for (var pi = 0; pi < t.paras.length; pi++) {
    parasHtml += "<p>" + t.paras[pi] + "</p>";
  }
  var mcqsHtml = "";
  for (var qi = 0; qi < t.mcqs.length; qi++) {
    var m = t.mcqs[qi];
    var sel = (state[qi] !== undefined) ? state[qi] : -1;
    var done = state.checked || false;
    var optsHtml = "";
    for (var oi = 0; oi < m.opts.length; oi++) {
      var cls = "mcq-opt";
      if (sel === oi) cls += " selected";
      if (done) {
        if (oi === m.ans) cls += " correct";
        else if (sel === oi) cls += " wrong";
      }
      var letter = String.fromCharCode(65 + oi);
      optsHtml += '<div class="' + cls + '" onclick="selectOpt(' + qi + ',' + oi + ')"><span class="opt-letter">' + letter + '</span><span>' + m.opts[oi] + '</span></div>';
    }
    var fbCls = "mcq-feedback";
    var fbTxt = "";
    if (done) {
      fbCls += (sel === m.ans) ? " ok show" : " bad show";
      fbTxt = (sel === m.ans) ? "&#10003; Correct" : "&#10007; Correct answer: " + String.fromCharCode(65 + m.ans);
    }
    mcqsHtml += '<div class="mcq-item"><div class="mcq-q">' + (qi+1) + '. ' + m.q + '</div>' +
      '<div class="mcq-opts" id="opts_' + key + '_' + qi + '">' + optsHtml + '</div>' +
      '<div class="' + fbCls + '" id="fb_' + key + '_' + qi + '">' + fbTxt + '</div></div>';
  }
  var scoreHtml = "";
  if (state.checked) {
    var sc = 0;
    for (var qi2 = 0; qi2 < t.mcqs.length; qi2++) {
      if (state[qi2] === t.mcqs[qi2].ans) sc++;
    }
    var pct = Math.round(sc / t.mcqs.length * 100);
    var scCls = pct >= 70 ? "score-pill pass show" : "score-pill fail show";
    scoreHtml = '<span class="' + scCls + '">' + sc + '/' + t.mcqs.length + ' (' + pct + '%) &mdash; ' + (pct >= 70 ? "Pass &#10003;" : "Review &#8634;") + '</span>';
  } else {
    scoreHtml = '<span class="score-pill" id="scorePill_' + key + '"></span>';
  }
  var btnDisabled = state.checked ? " disabled" : "";
  document.getElementById("mainPanel").innerHTML =
    '<div class="text-card">' +
    '<div class="text-num">Category: ' + CAT_LABELS[cat] + ' &bull; Text ' + (idx+1) + ' of 10</div>' +
    '<div class="text-title">' + t.title + '</div>' +
    '<div class="text-body">' + parasHtml + '</div>' +
    '</div>' +
    '<div class="mcq-section">' +
    '<div class="mcq-label">Comprehension Questions</div>' +
    mcqsHtml +
    '<div class="check-bar">' +
    '<button class="btn-check" id="btnCheck_' + key + '" onclick="checkAnswers()"' + btnDisabled + '>Check Answers</button>' +
    scoreHtml +
    '</div></div>';
}

function selectOpt(qi, oi) {
  var key = getStateKey(currentCat, currentIdx);
  if (answered[key] && answered[key].checked) return;
  if (!answered[key]) answered[key] = {};
  answered[key][qi] = oi;
  var container = document.getElementById("opts_" + key + "_" + qi);
  if (!container) return;
  var allOpts = container.querySelectorAll(".mcq-opt");
  for (var i = 0; i < allOpts.length; i++) {
    allOpts[i].classList.remove("selected");
  }
  if (allOpts[oi]) allOpts[oi].classList.add("selected");
}

function checkAnswers() {
  var cat = currentCat;
  var idx = currentIdx;
  var key = getStateKey(cat, idx);
  var t = DATA[cat][idx];
  if (!answered[key]) answered[key] = {};
  answered[key].checked = true;
  var score = 0;
  for (var qi = 0; qi < t.mcqs.length; qi++) {
    var m = t.mcqs[qi];
    var sel = (answered[key][qi] !== undefined) ? answered[key][qi] : -1;
    var correct = (sel === m.ans);
    if (correct) score++;
    var container = document.getElementById("opts_" + key + "_" + qi);
    if (container) {
      var opts = container.querySelectorAll(".mcq-opt");
      for (var oi = 0; oi < opts.length; oi++) {
        opts[oi].classList.remove("selected", "correct", "wrong");
        if (oi === m.ans) opts[oi].classList.add("correct");
        else if (oi === sel) opts[oi].classList.add("wrong");
      }
    }
    var fb = document.getElementById("fb_" + key + "_" + qi);
    if (fb) {
      fb.innerHTML = correct ? "&#10003; Correct" : "&#10007; Correct answer: " + String.fromCharCode(65 + m.ans);
      fb.className = "mcq-feedback show " + (correct ? "ok" : "bad");
    }
  }
  var pct = Math.round(score / t.mcqs.length * 100);
  var btn = document.getElementById("btnCheck_" + key);
  if (btn) btn.disabled = true;
  var pill = document.getElementById("scorePill_" + key);
  if (pill) {
    pill.className = pct >= 70 ? "score-pill pass show" : "score-pill fail show";
    pill.innerHTML = score + "/" + t.mcqs.length + " (" + pct + "%) &mdash; " + (pct >= 70 ? "Pass &#10003;" : "Review &#8634;");
  }
  renderSidebar(cat);
}

function loadText(cat, idx) {
  currentCat = cat;
  currentIdx = idx;
  renderText(cat, idx);
  renderSidebar(cat);
  window.scrollTo(0, 0);
}

function switchCat(evt, cat) {
  currentCat = cat;
  currentIdx = 0;
  var tabs = document.querySelectorAll(".cat-tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  if (evt && evt.currentTarget) evt.currentTarget.classList.add("active");
  renderSidebar(cat);
  renderText(cat, 0);
  window.scrollTo(0, 0);
}

function updateProgress() {
  var total = 50;
  var done = Object.keys(visited).length;
  document.getElementById("progFill").style.width = (done / total * 100) + "%";
  document.getElementById("progLabel").textContent = done + " / " + total + " texts visited";
}

renderSidebar(currentCat);
renderText(currentCat, 0);

</script>
</body>
</html>
